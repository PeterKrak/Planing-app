<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plánování</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f5f7;
            color: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: radial-gradient(circle at top, rgba(102, 126, 234, 0.18), transparent 30%),
                        linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        }

        .app {
            width: min(980px, 100%);
            background: white;
            border-radius: 28px;
            box-shadow: 0 22px 80px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 32px 32px 16px;
        }

        .left {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .right {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }

        .right label {
            font-size: 0.9rem;
            color: #52525b;
            font-weight: 600;
        }

        .right input {
            padding: 8px 12px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white !important;
            color: #111827;
            min-width: 150px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 24px;
            background: #eef2ff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #3730a3;
        }

        .header h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }

        .header p {
            margin: 0;
            color: #52525b;
            font-size: 0.98rem;
        }

        .cards {
            display: grid;
            gap: 20px;
            padding: 0 32px 32px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            padding: 26px 28px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
        }

        .card h2 {
            margin: 0 0 14px;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            color: #111827;
        }

        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 14px;
        }

        .section-title span {
            font-size: 1.15rem;
        }

        ul {
            margin: 0;
            padding-left: 18px;
            color: #4b5563;
            line-height: 1.85;
        }

        ul li {
            margin-bottom: 6px;
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            color: #374151;
            font-size: 0.95rem;
        }

        button.pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            font: inherit;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background-color 0.12s ease;
        }

        button.pill:hover {
            background: #eef2ff;
        }

        button.pill:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
        }

        button.pill:focus-visible {
            outline: 3px solid rgba(59, 130, 246, 0.4);
            outline-offset: 2px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 24px 32px 32px;
            border-top: 1px solid #e5e7eb;
            background: #f8fafc;
        }

        .toolbar button {
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            background: #f3f4f6;
            color: #1f2937;
        }

        .toolbar button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        }

        .toolbar button.primary {
            background: #4338ca;
            color: white;
        }

        .toolbar button.positive {
            background: #ecfdf5;
            color: #166534;
        }

        .toolbar button.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .toolbar button.neutral {
            background: #e2e8f0;
            color: #1f2937;
        }

        @media (max-width: 720px) {
            .header {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            .left {
                flex-direction: column;
                text-align: center;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .cards {
                padding: 0 20px 24px;
            }

            .toolbar {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="header">
            <div class="left">
                <div class="badge" id="date-badge">17</div>
                <div>
                    <h1 id="weekday-name">Pátek</h1>
                    <p>Aktuální stav plánovaných absencí a onsite týmů</p>
                </div>
            </div>
            <div class="right">
                <label for="name-input" id="name-label">Jméno:</label>
                <input type="text" id="name-input" placeholder="Vložte jméno">
                <span id="name-display" style="display: none; font-weight: 600; color: #334155;"></span>
                <button type="button" id="save-button" class="pill" onclick="toggleSaveChange()">Save</button>
            </div>
        </section>

        <section class="cards">
            <article class="card">
                <div class="section-title"><span>🏠</span> Home Office:</div>
                <ul id="home-office-list"></ul>
            </article>

            <article class="card">
                <div class="section-title"><span>🌴</span> Vacation:</div>
                <ul id="vacation-list"></ul>
            </article>

            <article class="card">
                <div class="section-title"><span>📍</span> Onsite</div>
                <p id="status-text" style="margin: 0; color: #475569;"></p>
                <div class="status-row">
                        <button type="button" class="pill" onclick="confirmOnsite()">✅ Confirm Onsite</button>
                    <button type="button" class="pill" onclick="addHomeOffice()">🏠 HO</button>
                    <button type="button" class="pill" onclick="addVacation()">🌴 Vacation</button>
                    <button type="button" class="pill">📅 Planned Absences</button>
                    <button type="button" class="pill" onclick="showAllConfirmed()">🗂️ Show all</button>
                </div>
                <div id="history-links" class="status-row" style="margin-top: 16px; justify-content: center;"></div>
            </article>
        </section>

    </main>
    <script>
        let currentDate = new Date().toDateString();
        const confirmedNames = new Set();

        function removeNameFromAllSections(name) {
            const hoList = document.getElementById('home-office-list');
            const vacationList = document.getElementById('vacation-list');

            const hoItems = Array.from(hoList.querySelectorAll('li'));
            const hoItem = hoItems.find(item => item.textContent === name);
            if (hoItem) hoItem.remove();

            const vacItems = Array.from(vacationList.querySelectorAll('li'));
            const vacItem = vacItems.find(item => item.textContent === name);
            if (vacItem) vacItem.remove();

            if (confirmedNames.has(name)) {
                confirmedNames.delete(name);
                const statusText = document.getElementById('status-text');
                const text = statusText.textContent.trim();
                const match = text.match(/(\d+) confirmed/);
                let confirmed = match ? parseInt(match[1]) : 0;
                confirmed--;
                statusText.textContent = confirmed > 0 ? `${confirmed} confirmed` : '';
            }
            saveData();
        }

        function saveData() {
            const hoList = document.getElementById('home-office-list');
            const vacationList = document.getElementById('vacation-list');
            const display = document.getElementById('name-display');
            const statusText = document.getElementById('status-text');

            const data = {
                userName: display.textContent,
                homeOffice: Array.from(hoList.querySelectorAll('li')).map(li => li.textContent),
                vacation: Array.from(vacationList.querySelectorAll('li')).map(li => li.textContent),
                confirmed: Array.from(confirmedNames),
                confirmedText: statusText.textContent
            };

            const key = 'planningAppData_' + currentDate;
            localStorage.setItem(key, JSON.stringify(data));
        }

        function loadData(date = currentDate) {
            const key = 'planningAppData_' + date;
            const data = JSON.parse(localStorage.getItem(key));
            if (!data) return;

            const display = document.getElementById('name-display');
            const hoList = document.getElementById('home-office-list');
            const vacationList = document.getElementById('vacation-list');
            const statusText = document.getElementById('status-text');
            const button = document.getElementById('save-button');
            const label = document.getElementById('name-label');
            const input = document.getElementById('name-input');

            if (data.userName) {
                display.textContent = data.userName;
                display.style.display = 'inline';
                input.style.display = 'none';
                label.style.display = 'none';
                button.textContent = 'Change';
            } else {
                display.style.display = 'none';
                input.style.display = 'inline-block';
                label.style.display = 'inline';
                button.textContent = 'Save';
                input.value = '';
            }

            hoList.innerHTML = '';
            if (data.homeOffice && Array.isArray(data.homeOffice)) {
                data.homeOffice.forEach(name => {
                    const item = document.createElement('li');
                    item.textContent = name;
                    hoList.appendChild(item);
                });
            }

            vacationList.innerHTML = '';
            if (data.vacation && Array.isArray(data.vacation)) {
                data.vacation.forEach(name => {
                    const item = document.createElement('li');
                    item.textContent = name;
                    vacationList.appendChild(item);
                });
            }

            confirmedNames.clear();
            if (data.confirmed && Array.isArray(data.confirmed)) {
                data.confirmed.forEach(name => confirmedNames.add(name));
            }

            statusText.textContent = data.confirmedText || '';
        }

        function loadHistoricalData(dateString) {
            currentDate = dateString;
            loadData(dateString);
            updateDateBadge();
            updateWeekdayName();
            updateHistoryLinks();
        }

        function updateHistoryLinks() {
            const historyContainer = document.getElementById('history-links');
            if (!historyContainer) {
                console.error('History container not found!');
                return;
            }
            historyContainer.innerHTML = '';

            console.log('Updating history links...');

            const today = new Date();
            for (let i = 1; i <= 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                const dateString = date.toDateString();
                const key = 'planningAppData_' + dateString;

                console.log('Checking key:', key, 'Exists:', !!localStorage.getItem(key));

                if (localStorage.getItem(key)) {
                    const link = document.createElement('button');
                    link.type = 'button';
                    link.className = 'pill';
                    if (i === 1) {
                        link.textContent = '📅 Yesterday';
                    } else {
                        link.textContent = date.toLocaleDateString('cs-CZ');
                    }
                    link.onclick = () => loadHistoricalData(dateString);
                    historyContainer.appendChild(link);
                }
            }

            console.log('History links updated, container has', historyContainer.children.length, 'children');
        }

        function confirmOnsite() {
            const display = document.getElementById('name-display');
            const input = document.getElementById('name-input');
            const name = display.style.display !== 'none' ? display.textContent.trim() : input.value.trim();
            
            if (!name) {
                return;
            }

            const statusText = document.getElementById('status-text');
            const text = statusText.textContent.trim();
            const match = text.match(/(\d+) confirmed/);
            let confirmed = match ? parseInt(match[1]) : 0;

            if (confirmedNames.has(name)) {
                confirmedNames.delete(name);
                confirmed--;
            } else {
                removeNameFromAllSections(name);
                confirmedNames.add(name);
                confirmed++;
            }

            statusText.textContent = confirmed > 0 ? `${confirmed} confirmed` : '';
            saveData();
        }

        function addHomeOffice() {
            const display = document.getElementById('name-display');
            const input = document.getElementById('name-input');
            const name = display.style.display !== 'none' ? display.textContent.trim() : input.value.trim();
            
            if (!name) {
                input.focus();
                return;
            }

            const list = document.getElementById('home-office-list');
            const items = Array.from(list.querySelectorAll('li'));
            const existingItem = items.find(item => item.textContent === name);

            if (existingItem) {
                existingItem.remove();
            } else {
                removeNameFromAllSections(name);
                const item = document.createElement('li');
                item.textContent = name;
                list.appendChild(item);
            }
            saveData();
        }

        function addVacation() {
            const display = document.getElementById('name-display');
            const input = document.getElementById('name-input');
            const name = display.style.display !== 'none' ? display.textContent.trim() : input.value.trim();
            
            if (!name) {
                input.focus();
                return;
            }

            const list = document.getElementById('vacation-list');
            const items = Array.from(list.querySelectorAll('li'));
            const existingItem = items.find(item => item.textContent === name);

            if (existingItem) {
                existingItem.remove();
            } else {
                removeNameFromAllSections(name);
                const item = document.createElement('li');
                item.textContent = name;
                list.appendChild(item);
            }
            saveData();
        }

        function updateDateBadge() {
            const badge = document.getElementById('date-badge');
            if (!badge) return;
            const date = new Date(currentDate);
            badge.textContent = String(date.getDate());
        }

        function updateWeekdayName() {
            const title = document.getElementById('weekday-name');
            if (!title) return;

            const weekdaysCs = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
            const date = new Date(currentDate);
            title.textContent = weekdaysCs[date.getDay()];
        }

        function toggleSaveChange() {
            const input = document.getElementById('name-input');
            const label = document.getElementById('name-label');
            const display = document.getElementById('name-display');
            const button = document.getElementById('save-button');
            const currentMode = button.textContent.trim();

            if (currentMode === 'Save') {
                const name = input.value.trim();
                if (!name) {
                    input.focus();
                    return;
                }
                input.style.display = 'none';
                label.style.display = 'none';
                display.textContent = name;
                display.style.display = 'inline';
                button.textContent = 'Change';
            } else {
                input.style.display = 'inline-block';
                label.style.display = 'inline';
                display.style.display = 'none';
                input.value = display.textContent;
                button.textContent = 'Save';
                input.focus();
            }
            saveData();
        }

        function showAllConfirmed() {
            if (confirmedNames.size === 0) {
                alert('Žádní confirmed uživatelé.');
                return;
            }
            
            const namesList = Array.from(confirmedNames).join('\n');
            alert('Confirmed uživatelé:\n\n' + namesList);
        }

        updateDateBadge();
        updateWeekdayName();
        loadData();
        updateHistoryLinks();

        // Odstranit testovací data - používat jen skutečná data
        // const yesterday = new Date();
        // yesterday.setDate(yesterday.getDate() - 1);

        //         userName: 'Test User',
        //         homeOffice: ['John Doe', 'Jane Smith'],
        //         vacation: ['Bob Johnson'],
        //         confirmed: ['John Doe'],
        //         confirmedText: '1 confirmed'
        //     };
        //     localStorage.setItem(yesterdayKey, JSON.stringify(testData));
        //     console.log('Added test data for yesterday:', yesterday.toDateString());
        //     updateHistoryLinks();
        // }
    </script>
</body>
</html>
