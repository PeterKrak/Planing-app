<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plánování</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f5f7;
            color: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: radial-gradient(circle at top, rgba(102, 126, 234, 0.18), transparent 30%),
                        linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        }

        .app {
            width: min(980px, 100%);
            background: white;
            border-radius: 28px;
            box-shadow: 0 22px 80px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 32px 32px 16px;
        }

        .left {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .right {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }

        .right label {
            font-size: 0.9rem;
            color: #52525b;
            font-weight: 600;
        }

        .right input {
            padding: 8px 12px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white !important;
            color: #111827;
            min-width: 150px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 24px;
            background: #eef2ff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #3730a3;
        }

        .header h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }

        .header p {
            margin: 0;
            color: #52525b;
            font-size: 0.98rem;
        }

        .cards {
            display: grid;
            gap: 20px;
            padding: 0 32px 32px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            padding: 26px 28px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
        }

        .card h2 {
            margin: 0 0 14px;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            color: #111827;
        }

        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 14px;
        }

        .section-title span {
            font-size: 1.15rem;
        }

        ul {
            margin: 0;
            padding-left: 18px;
            color: #4b5563;
            line-height: 1.85;
        }

        ul li {
            margin-bottom: 6px;
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            color: #374151;
            font-size: 0.95rem;
        }

        button.pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            font: inherit;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background-color 0.12s ease;
        }

        button.pill:hover {
            background: #eef2ff;
        }

        button.pill:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
        }

        button.pill:focus-visible {
            outline: 3px solid rgba(59, 130, 246, 0.4);
            outline-offset: 2px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 24px 32px 32px;
            border-top: 1px solid #e5e7eb;
            background: #f8fafc;
        }

        .toolbar button {
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            background: #f3f4f6;
            color: #1f2937;
        }

        .toolbar button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        }

        .toolbar button.primary {
            background: #4338ca;
            color: white;
        }

        .toolbar button.positive {
            background: #ecfdf5;
            color: #166534;
        }

        .toolbar button.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .toolbar button.neutral {
            background: #e2e8f0;
            color: #1f2937;
        }

        @media (max-width: 720px) {
            .header {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            .left {
                flex-direction: column;
                text-align: center;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .cards {
                padding: 0 20px 24px;
            }

            .toolbar {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="header">
            <div class="left">
                <div class="badge" id="date-badge">17</div>
                <div>
                    <h1 id="weekday-name">Pátek</h1>
                    <p>Aktuální stav plánovaných absencí a onsite týmů</p>
                </div>
            </div>
            <div class="right">
                <label for="name-input" id="name-label">Jméno:</label>
                <input type="text" id="name-input" placeholder="Vložte jméno">
                <span id="name-display" style="display: none; font-weight: 600; color: #334155;"></span>
                <button type="button" id="save-button" class="pill" onclick="toggleSaveChange()">Save</button>
            </div>
        </section>

        <section class="cards">
            <article class="card">
                <div class="section-title"><span>🏠</span> Home Office:</div>
                <ul id="home-office-list"></ul>
            </article>

            <article class="card">
                <div class="section-title"><span>🌴</span> Vacation:</div>
                <ul id="vacation-list"></ul>
            </article>

            <article class="card">
                <div class="section-title"><span>📍</span> Onsite</div>
                <p id="status-text" style="margin: 0; color: #475569;"></p>
                <div class="status-row">
                        <button type="button" class="pill" onclick="confirmOnsite()">✅ Confirm Onsite</button>
                    <button type="button" class="pill" onclick="addHomeOffice()">🏠 HO</button>
                    <button type="button" class="pill" onclick="addVacation()">🌴 Vacation</button>
                    <button type="button" class="pill">📅 Planned Absences</button>
                    <button type="button" class="pill">🗂️ Show all</button>
                </div>
            </article>
        </section>

    </main>
    <script>
        const confirmedNames = new Set();

        function confirmOnsite() {
            const display = document.getElementById('name-display');
            const input = document.getElementById('name-input');
            const name = display.style.display !== 'none' ? display.textContent.trim() : input.value.trim();
            
            if (!name) {
                return;
            }

            const statusText = document.getElementById('status-text');
            const text = statusText.textContent.trim();
            const match = text.match(/(\d+) confirmed/);
            let confirmed = match ? parseInt(match[1]) : 0;

            if (confirmedNames.has(name)) {
                confirmedNames.delete(name);
                confirmed--;
            } else {
                confirmedNames.add(name);
                confirmed++;
            }

            statusText.textContent = confirmed > 0 ? `${confirmed} confirmed` : '';
        }

        function addHomeOffice() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) {
                input.focus();
                return;
            }

            const list = document.getElementById('home-office-list');
            const item = document.createElement('li');
            item.textContent = name;
            list.appendChild(item);
            input.value = '';
            input.focus();
        }

        function addVacation() {
            const input = document.getElementById('name-input');
            const name = input.value.trim();
            if (!name) {
                input.focus();
                return;
            }

            const list = document.getElementById('vacation-list');
            const item = document.createElement('li');
            item.textContent = name;
            list.appendChild(item);
            input.value = '';
            input.focus();
        }

        function updateDateBadge() {
            const badge = document.getElementById('date-badge');
            if (!badge) return;
            const today = new Date();
            badge.textContent = String(today.getDate());
        }

        function updateWeekdayName() {
            const title = document.getElementById('weekday-name');
            if (!title) return;

            const weekdaysCs = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
            const today = new Date();
            title.textContent = weekdaysCs[today.getDay()];
        }

        function toggleSaveChange() {
            const input = document.getElementById('name-input');
            const label = document.getElementById('name-label');
            const display = document.getElementById('name-display');
            const button = document.getElementById('save-button');
            const currentMode = button.textContent.trim();

            if (currentMode === 'Save') {
                const name = input.value.trim();
                if (!name) {
                    input.focus();
                    return;
                }
                input.style.display = 'none';
                label.style.display = 'none';
                display.textContent = name;
                display.style.display = 'inline';
                button.textContent = 'Change';
            } else {
                input.style.display = 'inline-block';
                label.style.display = 'inline';
                display.style.display = 'none';
                input.value = display.textContent;
                button.textContent = 'Save';
                input.focus();
            }
        }

        updateDateBadge();
        updateWeekdayName();
    </script>
</body>
</html>
